<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{project_name}} Implementation Report</title>
  <style>body{font-family:Arial,sans-serif;line-height:1.6;margin:0;color:#111827}main{max-width:960px;margin:auto;padding:32px}table{border-collapse:collapse;width:100%}td,th{border:1px solid #d1d5db;padding:8px;text-align:left}</style>
</head>
<body>
  <main>
    <h1>Implementation Report</h1>
    <p><strong>Status:</strong> {{status}}</p>
    <p><strong>Publication mode:</strong> {{publication_mode}}</p>
    <section>
      <h2>Actions</h2>
      <table><thead><tr><th>Action</th><th>Target</th><th>Result</th></tr></thead><tbody>{{actions_rows}}</tbody></table>
    </section>
    <section>
      <h2>Created Items</h2>
      <div>{{created_items}}</div>
    </section>
    <section>
      <h2>Updated Items</h2>
      <div>{{updated_items}}</div>
    </section>
    <section>
      <h2>Skipped Items and Warnings</h2>
      <div>{{warnings}}</div>
    </section>
  </main>
</body>
</html>
